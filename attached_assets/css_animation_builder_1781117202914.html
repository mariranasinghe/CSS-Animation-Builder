
<style id="cab-kf-style"></style>
<style>
.cab-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.cab-label { font-size:12px; color:var(--color-text-secondary); min-width:76px; font-family:var(--font-mono); }
.cab-val { font-size:12px; font-weight:500; color:var(--color-text-primary); min-width:50px; text-align:right; font-family:var(--font-mono); }
.cab-section { background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem 1.25rem; margin-bottom:1rem; }
.kf-dot { position:absolute; top:50%; transform:translateY(-50%); width:18px; height:18px; border-radius:50%; cursor:pointer; z-index:2; transition:box-shadow 0.12s; }
.kf-dot:hover { box-shadow:0 0 0 3px var(--color-border-secondary); }
.preset-btn { font-size:12px; padding:4px 11px; border-radius:99px; }
</style>

<div style="padding:1rem 0;">
<h2 class="sr-only">CSS animation builder — visually create keyframe animations and export CSS code</h2>

<p style="font-size:22px;font-weight:500;color:var(--color-text-primary);margin:0 0 3px;">CSS animation builder</p>
<p style="font-size:14px;color:var(--color-text-secondary);margin:0 0 1.25rem;">Click the timeline to add keyframes. Adjust properties. Copy the CSS.</p>

<div style="display:grid;grid-template-columns:180px 1fr;gap:12px;margin-bottom:1rem;">
  <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);display:flex;align-items:center;justify-content:center;min-height:148px;">
    <div id="cab-el" style="width:56px;height:56px;border-radius:12px;background:#7F77DD;"></div>
  </div>
  <div class="cab-section" style="margin-bottom:0;">
    <div class="cab-row">
      <span class="cab-label">duration</span>
      <input type="range" id="s-dur" min="0.2" max="5" step="0.1" value="1.5" style="flex:1;" oninput="ST.dur=+this.value;document.getElementById('v-dur').textContent=(+this.value).toFixed(1)+'s';go()">
      <span class="cab-val" id="v-dur">1.5s</span>
    </div>
    <div class="cab-row">
      <span class="cab-label">easing</span>
      <select id="s-ease" style="flex:1;font-size:13px;" onchange="ST.ease=this.value;go()">
        <option value="ease">ease</option>
        <option value="ease-in">ease-in</option>
        <option value="ease-out">ease-out</option>
        <option value="ease-in-out" selected>ease-in-out</option>
        <option value="linear">linear</option>
        <option value="cubic-bezier(0.68,-0.55,0.265,1.55)">spring</option>
        <option value="steps(6)">steps(6)</option>
      </select>
    </div>
    <div class="cab-row">
      <span class="cab-label">repeat</span>
      <select id="s-iter" style="flex:1;font-size:13px;" onchange="ST.iter=this.value;go()">
        <option value="infinite" selected>infinite</option>
        <option value="1">once</option>
        <option value="2">twice</option>
        <option value="3">3×</option>
      </select>
    </div>
    <div class="cab-row" style="margin-bottom:0;">
      <span class="cab-label">direction</span>
      <select id="s-dir" style="flex:1;font-size:13px;" onchange="ST.dir=this.value;go()">
        <option value="normal" selected>normal</option>
        <option value="alternate">alternate</option>
        <option value="reverse">reverse</option>
        <option value="alternate-reverse">alt-reverse</option>
      </select>
    </div>
  </div>
</div>

<div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;">
  <span style="font-size:12px;color:var(--color-text-tertiary);">Presets:</span>
  <button class="preset-btn" onclick="preset('bounce')">Bounce</button>
  <button class="preset-btn" onclick="preset('spin')">Spin</button>
  <button class="preset-btn" onclick="preset('pulse')">Pulse</button>
  <button class="preset-btn" onclick="preset('slide')">Slide in</button>
  <button class="preset-btn" onclick="preset('fade')">Fade</button>
  <button class="preset-btn" onclick="preset('pop')">Pop</button>
  <button class="preset-btn" onclick="preset('wobble')">Wobble</button>
</div>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
  <span style="font-size:12px;color:var(--color-text-secondary);">Timeline — click empty space to add a keyframe</span>
  <button id="del-btn" onclick="delKF()" style="font-size:12px;padding:3px 10px;display:none;color:var(--color-text-danger);border-color:var(--color-border-danger);">
    <i class="ti ti-trash" style="font-size:12px;margin-right:3px;" aria-hidden="true"></i>Delete keyframe
  </button>
</div>
<div id="tl" style="position:relative;height:44px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:1rem;cursor:crosshair;user-select:none;"></div>

<div id="kf-props" class="cab-section"></div>

<div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);">
    <span style="font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono);">Generated CSS</span>
    <button id="copy-btn" onclick="copyIt()" style="font-size:12px;padding:3px 10px;">
      <i class="ti ti-copy" style="font-size:12px;margin-right:3px;" aria-hidden="true"></i>Copy
    </button>
  </div>
  <pre id="css-out" style="margin:0;padding:14px;font-size:12px;font-family:var(--font-mono);color:var(--color-text-primary);white-space:pre;line-height:1.65;overflow-x:auto;"></pre>
</div>
</div>

<script>
let KF = [
  {pct:0,   tx:0, ty:0, rot:0,   sc:1,    op:1},
  {pct:100, tx:0, ty:0, rot:0,   sc:1,    op:1},
];
let SI = 0;
let ST = {dur:1.5, ease:'ease-in-out', iter:'infinite', dir:'normal'};

const PRESETS = {
  bounce:  { kf:[{pct:0,tx:0,ty:0,rot:0,sc:1,op:1},{pct:45,tx:0,ty:-70,rot:0,sc:1.08,op:1},{pct:55,tx:0,ty:-70,rot:0,sc:1.08,op:1},{pct:100,tx:0,ty:0,rot:0,sc:1,op:1}], dur:1.1, ease:'ease-in-out', iter:'infinite', dir:'normal' },
  spin:    { kf:[{pct:0,tx:0,ty:0,rot:0,sc:1,op:1},{pct:100,tx:0,ty:0,rot:360,sc:1,op:1}], dur:1.5, ease:'linear', iter:'infinite', dir:'normal' },
  pulse:   { kf:[{pct:0,tx:0,ty:0,rot:0,sc:1,op:1},{pct:50,tx:0,ty:0,rot:0,sc:1.25,op:0.75},{pct:100,tx:0,ty:0,rot:0,sc:1,op:1}], dur:1.2, ease:'ease-in-out', iter:'infinite', dir:'normal' },
  slide:   { kf:[{pct:0,tx:-160,ty:0,rot:0,sc:0.8,op:0},{pct:100,tx:0,ty:0,rot:0,sc:1,op:1}], dur:0.65, ease:'cubic-bezier(0.68,-0.55,0.265,1.55)', iter:'infinite', dir:'alternate' },
  fade:    { kf:[{pct:0,tx:0,ty:0,rot:0,sc:1,op:1},{pct:50,tx:0,ty:0,rot:0,sc:1,op:0},{pct:100,tx:0,ty:0,rot:0,sc:1,op:1}], dur:2, ease:'ease-in-out', iter:'infinite', dir:'normal' },
  pop:     { kf:[{pct:0,tx:0,ty:0,rot:-10,sc:0,op:0},{pct:70,tx:0,ty:0,rot:5,sc:1.2,op:1},{pct:100,tx:0,ty:0,rot:0,sc:1,op:1}], dur:0.55, ease:'ease-out', iter:'infinite', dir:'alternate' },
  wobble:  { kf:[{pct:0,tx:0,ty:0,rot:0,sc:1,op:1},{pct:20,tx:-18,ty:0,rot:-8,sc:1,op:1},{pct:40,tx:16,ty:0,rot:6,sc:1,op:1},{pct:60,tx:-12,ty:0,rot:-4,sc:1,op:1},{pct:80,tx:8,ty:0,rot:2,sc:1,op:1},{pct:100,tx:0,ty:0,rot:0,sc:1,op:1}], dur:1, ease:'ease-in-out', iter:'infinite', dir:'normal' },
};

function preset(name) {
  const p = PRESETS[name];
  KF = p.kf.map(k=>({...k}));
  ST = {dur:p.dur, ease:p.ease, iter:p.iter, dir:p.dir};
  document.getElementById('s-dur').value = p.dur;
  document.getElementById('v-dur').textContent = Number(p.dur).toFixed(1)+'s';
  document.getElementById('s-ease').value = p.ease;
  document.getElementById('s-iter').value = p.iter;
  document.getElementById('s-dir').value = p.dir;
  SI = 0;
  renderTL(); renderProps(); go();
}

function lerp(a,b,t){return a+(b-a)*t;}

function renderTL() {
  const tl = document.getElementById('tl');
  tl.innerHTML='';
  [0,25,50,75,100].forEach(p=>{
    const tick = document.createElement('div');
    const off = p===0?6:p===100?-6:0;
    tick.style.cssText=`position:absolute;left:calc(${p}% + ${off}px);top:50%;transform:translate(-50%,-50%);font-size:10px;color:var(--color-text-tertiary);pointer-events:none;font-family:monospace;`;
    tick.textContent=p+'%';
    tl.appendChild(tick);
  });

  tl.onclick = e => {
    const r = tl.getBoundingClientRect();
    const pct = Math.round(((e.clientX-r.left)/r.width)*100);
    const clamped = Math.max(1, Math.min(99, pct));
    if (KF.some(k=>Math.abs(k.pct-clamped)<4)) return;
    const sorted=[...KF].sort((a,b)=>a.pct-b.pct);
    let bef=sorted[0], aft=sorted[sorted.length-1];
    for(const k of sorted){if(k.pct<=clamped)bef=k;}
    for(const k of [...sorted].reverse()){if(k.pct>=clamped)aft=k;}
    const t=bef.pct===aft.pct?0:(clamped-bef.pct)/(aft.pct-bef.pct);
    KF.push({
      pct:clamped,
      tx:Math.round(lerp(bef.tx,aft.tx,t)),
      ty:Math.round(lerp(bef.ty,aft.ty,t)),
      rot:Math.round(lerp(bef.rot,aft.rot,t)),
      sc:Math.round(lerp(bef.sc,aft.sc,t)*100)/100,
      op:Math.round(lerp(bef.op,aft.op,t)*100)/100,
    });
    SI=KF.length-1;
    renderTL(); renderProps(); go();
  };

  KF.forEach((k,i)=>{
    const dot = document.createElement('div');
    dot.className='kf-dot';
    const isSel=i===SI;
    dot.style.left=`calc(${k.pct}% - 9px)`;
    dot.style.background=isSel?'#7F77DD':'var(--color-background-primary)';
    dot.style.border=`2px solid ${isSel?'#7F77DD':'var(--color-border-primary)'}`;
    dot.title=`${k.pct}%`;
    dot.onclick=e=>{e.stopPropagation();SI=i;renderTL();renderProps();};
    tl.appendChild(dot);
  });

  const kf=KF[SI];
  document.getElementById('del-btn').style.display=(kf&&kf.pct!==0&&kf.pct!==100)?'inline-flex':'none';
}

function delKF(){
  if(!KF[SI]||KF[SI].pct===0||KF[SI].pct===100)return;
  KF.splice(SI,1);
  SI=Math.max(0,SI-1);
  renderTL();renderProps();go();
}

function renderProps(){
  const kf=KF[SI];
  if(!kf){document.getElementById('kf-props').innerHTML='';return;}
  const row=(id,lbl,min,max,step,val,unit,expr)=>`
    <div class="cab-row">
      <span class="cab-label">${lbl}</span>
      <input type="range" id="p-${id}" min="${min}" max="${max}" step="${step}" value="${val}" style="flex:1;" oninput="KF[SI].${id}=+this.value;document.getElementById('v-${id}').textContent=(${expr})+'${unit}';go()">
      <span class="cab-val" id="v-${id}">${val}${unit}</span>
    </div>`;
  document.getElementById('kf-props').innerHTML=`
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;">
      <i class="ti ti-adjustments-horizontal" style="font-size:13px;margin-right:5px;vertical-align:-1px;" aria-hidden="true"></i>Keyframe at ${kf.pct}%
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px;">
      <div>
        ${row('tx','translateX',-200,200,5,kf.tx,'px','this.value')}
        ${row('ty','translateY',-200,200,5,kf.ty,'px','this.value')}
        ${row('rot','rotate',-360,360,5,kf.rot,'°','this.value')}
      </div>
      <div>
        ${row('sc','scale',0,3,0.05,(kf.sc).toFixed(2),'','(+this.value).toFixed(2)')}
        ${row('op','opacity',0,1,0.05,(kf.op).toFixed(2),'','(+this.value).toFixed(2)')}
      </div>
    </div>`;
}

function go(){
  const sorted=[...KF].sort((a,b)=>a.pct-b.pct);
  const lines=sorted.map(k=>{
    const tr=`translate(${k.tx}px, ${k.ty}px) rotate(${k.rot}deg) scale(${(+k.sc).toFixed(2)})`;
    return `  ${k.pct}% { transform: ${tr}; opacity: ${(+k.op).toFixed(2)}; }`;
  }).join('\n');
  document.getElementById('cab-kf-style').textContent=`@keyframes _cab { ${lines} }`;
  const el=document.getElementById('cab-el');
  el.style.animation='none';el.offsetHeight;
  el.style.animation=`_cab ${ST.dur}s ${ST.ease} ${ST.iter} ${ST.dir}`;
  const out=sorted.map(k=>{
    const tr=`translate(${k.tx}px, ${k.ty}px) rotate(${k.rot}deg) scale(${(+k.sc).toFixed(2)})`;
    return `  ${k.pct}% {\n    transform: ${tr};\n    opacity: ${(+k.op).toFixed(2)};\n  }`;
  }).join('\n');
  document.getElementById('css-out').textContent=`@keyframes myAnimation {\n${out}\n}\n\n.element {\n  animation: myAnimation ${ST.dur}s ${ST.ease}\n             ${ST.iter} ${ST.dir};\n}`;
}

function copyIt(){
  navigator.clipboard.writeText(document.getElementById('css-out').textContent).then(()=>{
    const b=document.getElementById('copy-btn');
    b.innerHTML='<i class="ti ti-check" style="font-size:12px;margin-right:3px;" aria-hidden="true"></i>Copied';
    setTimeout(()=>{b.innerHTML='<i class="ti ti-copy" style="font-size:12px;margin-right:3px;" aria-hidden="true"></i>Copy';},2000);
  });
}

renderTL(); renderProps(); go();
</script>
